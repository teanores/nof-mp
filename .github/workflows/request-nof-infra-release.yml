name: Request NOF infra release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Semver tag to request, for validation only"
        required: true
        type: string
      execute_deploy:
        description: "Dispatch production deploy request to nof-infra"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: nof-mp-release-dispatch-${{ github.event.release.tag_name || inputs.ref }}
  cancel-in-progress: false

jobs:
  request-nof-infra-release:
    name: Request nof-infra release-builder deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve release request
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.ref }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          EXECUTE_DEPLOY: ${{ github.event_name == 'release' && 'true' || inputs.execute_deploy }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release ref must be a semver tag, got: $RELEASE_TAG" >&2
            exit 64
          fi

          if [[ "$EXECUTE_DEPLOY" != "true" ]]; then
            echo "execute_deploy=false; validation only, no nof-infra dispatch will be sent."
          fi

          approval_id="${RELEASE_URL:-nof-mp:${RELEASE_TAG}}"
          {
            echo "ref=$RELEASE_TAG"
            echo "approval_id=$approval_id"
            echo "execute_deploy=$EXECUTE_DEPLOY"
          } >> "$GITHUB_OUTPUT"

      - name: Dispatch nof-infra release-builder
        if: ${{ steps.release.outputs.execute_deploy == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.NOF_INFRA_RELEASE_DISPATCH_TOKEN }}
          REF: ${{ steps.release.outputs.ref }}
          APPROVAL_ID: ${{ steps.release.outputs.approval_id }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "NOF_INFRA_RELEASE_DISPATCH_TOKEN is required to request nof-infra deploy." >&2
            exit 78
          fi

          payload=$(jq -n \
            --arg ref "main" \
            --arg service "nof-mp" \
            --arg release_ref "$REF" \
            --arg approval_id "$APPROVAL_ID" \
            '{
              ref: $ref,
              inputs: {
                service: $service,
                ref: $release_ref,
                approval_id: $approval_id,
                execute_deploy: "true",
                nof_ht_migration_gate_approved: "false"
              }
            }')

          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/teanores/nof-infra/actions/workflows/release-builder.yml/dispatches \
            -d "$payload"

          echo "Requested nof-infra release-builder deploy for nof-mp ${REF}."
